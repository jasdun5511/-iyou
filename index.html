<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splendid Vocabulary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home-view" class="view active">
            <header class="home-header">
                <h1>Splendid</h1>
                <div class="user-avatar"></div>
            </header>
            <main class="home-main">
                <div class="daily-card" id="btn-learn">
                    <div class="card-left">
                        <div class="book-cover core" id="btn-open-wordlist-cover">
                            <span class="cover-text" id="dash-cover-text">CORE<br>VOCAB</span>
                        </div>
                        <div class="book-info">
                            <h2 id="dash-book-title-text">核心葡语词汇</h2>
                            <p>今日待学：<span id="learn-count" class="highlight">0</span> 词</p>
                        </div>
                    </div>
                    <div class="card-right">
                        <button class="btn-primary-small">开始</button>
                    </div>
                </div>
                
                <div class="nav-grid">
                    <div class="nav-card">
                        <div class="nav-icon">📖</div>
                        <div class="nav-text">
                            <h3>词书库</h3>
                            <p class="nav-subtitle">更换学习内容</p>
                        </div>
                    </div>
                    <div class="nav-card" id="btn-review">
                        <div class="nav-icon">🔄</div>
                        <div class="nav-text">
                            <h3>智能复习</h3>
                            <p class="nav-subtitle" id="review-count">需复习 0 词</p>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="bottom-nav">
                <div class="nav-item active" id="btn-nav-home">
                    <div class="nav-icon-sm">🏠</div><span>学习</span>
                </div>
                <div class="nav-item" id="btn-nav-dashboard">
                    <div class="nav-icon-sm">📊</div><span>统计</span>
                </div>
            </footer>
        </div>

        <div id="learning-view" class="view hidden">
            <header class="learn-header">
                <button id="btn-back" class="btn-icon">←</button>
                <div class="progress-bar">
                    <span id="progress-text">1/20</span>
                </div>
                <div style="width: 24px;"></div>
            </header>
            
            <main class="learn-main">
                <div class="word-display">
                    <h1 id="word-pt">Word</h1>
                    <div class="word-meta">
                        <span id="phonetic-container" class="phonetic"><span class="speaker-icon">🔊</span> <span id="word-phonetic-text"></span></span>
                        <span id="word-pos" class="pos-tag"></span>
                    </div>
                    <h2 id="word-zh-title" class="zh-title"></h2>
                    
                    <div id="progress-dots" class="dots-container">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </div>
                    <div id="word-success-badge" class="success-badge hidden">✓ 熟悉</div>
                </div>

                <div id="skeleton-bars" class="skeleton-container hidden">
                    <div class="skeleton-bar" style="width: 80%;"></div>
                    <div class="skeleton-bar" style="width: 60%;"></div>
                    <div class="skeleton-bar" style="width: 90%;"></div>
                </div>

                <div id="quiz-area" class="interaction-area hidden">
                    <div class="options-container">
                        <button class="option"><div class="opt-content"></div></button>
                        <button class="option"><div class="opt-content"></div></button>
                        <button class="option"><div class="opt-content"></div></button>
                        <button class="option"><div class="opt-content"></div></button>
                    </div>
                </div>

                <div id="recognize-area" class="interaction-area hidden">
                    <div id="recognize-sentence-card" class="sentence-card">
                        <p id="recognize-example-pt" class="en-sentence"></p>
                    </div>
                    <div id="recognize-blind-text" class="blind-text hidden">努力回想一下释义...</div>
                </div>

                <div id="definition-area" class="definition-area hidden">
                    <button id="btn-open-immersive" class="btn-immersive">
                        <span class="im-icon">✨</span> 沉浸解析
                    </button>
                    <div class="example-box">
                        <p id="word-example-pt" class="en-sentence"></p>
                        <p id="word-example-zh" class="zh-sentence"></p>
                    </div>
                </div>

                <div id="detail-area" class="detail-area hidden">
                    <div class="tabs">
                        <button class="tab active" data-target="phrases">词组</button>
                        <button class="tab" data-target="synonyms">近义</button>
                        <button class="tab" data-target="roots">词根</button>
                    </div>
                    <div id="tab-content-container" class="tab-content"></div>
                </div>
            </main>

            <footer id="footer-quiz" class="learn-footer hidden"></footer>
            
            <footer id="footer-recognize" class="learn-footer dual-btns hidden">
                <button id="btn-not-recognize" class="btn-secondary">不认识</button>
                <button id="btn-hint" class="btn-secondary">提示</button>
                <button id="btn-recognize" class="btn-primary">认识</button>
            </footer>

            <footer id="footer-detail" class="learn-footer dual-btns hidden">
                <button id="btn-forgot" class="btn-secondary" style="flex: 0.5;">忘了</button>
                <button id="btn-next" class="btn-primary" style="flex: 1.5;">下一个</button>
            </footer>

            <footer id="footer-review-assess" class="learn-footer dual-btns hidden">
                <button id="btn-rev-blur" class="btn-secondary">模糊</button>
                <button id="btn-rev-forget" class="btn-secondary">忘了</button>
                <button id="btn-rev-know" class="btn-primary">认识</button>
            </footer>

            <footer id="footer-review-verify" class="learn-footer dual-btns hidden">
                <button id="btn-rev-wrong" class="btn-secondary">记错了</button>
                <button id="btn-rev-next" class="btn-primary">下一个</button>
            </footer>
        </div>

        <div id="immersive-modal" class="view hidden immersive-view">
            <button id="im-btn-close" class="im-close-btn">×</button>
            <div id="upper-window" class="im-upper-half">
                <div class="im-upper-tag" id="upper-source-tag">来源</div>
                <div id="upper-track" class="slider-track"></div>
                <div id="upper-dots" class="im-dots"></div>
            </div>
            <div id="lower-window" class="im-lower-half">
                <div id="global-dots" class="im-global-dots"></div>
                <div id="lower-track" class="slider-track"></div>
                <div class="im-footer">
                    <button id="im-btn-next-word" class="im-btn-primary">继续学习</button>
                </div>
            </div>
        </div>

        <div id="transition-view" class="view hidden">
            <div class="transition-content">
                <div class="success-icon-large">🎉</div>
                <h2>本组认知完成</h2>
                <p>接下来进行拼写强化，彻底掌握它们！</p>
                <div class="transition-actions">
                    <button id="btn-start-spell" class="btn-primary-large">开始拼写</button>
                    <button id="btn-skip-spell" class="btn-text">跳过，直接看小结</button>
                </div>
            </div>
        </div>

        <div id="spelling-view" class="view hidden">
            <div class="spell-header">
                <span id="spell-progress-text">1/10</span>
                <button id="btn-close-spell">×</button>
            </div>
            <div class="spell-main-content">
                <div class="meaning-area">
                    <p id="spell-word-meaning"></p>
                </div>
                <div class="input-container">
                    <div id="letter-boxes" class="letter-boxes"></div>
                    <input type="text" id="hidden-input" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
            </div>
            <div class="spell-footer">
                <div id="hint-container" class="hint-container">
                    <span id="bulb-icon">💡</span>
                </div>
                <button id="btn-submit-spell" class="btn-submit-spell">✓</button>
            </div>
        </div>

        <div id="summary-view" class="view hidden">
            <div class="summary-header">
                <h2>学习小结</h2>
                <p>本次共学习 <span id="total-words-count" class="highlight">0</span> 词</p>
            </div>
            <div class="summary-content">
                <div id="summary-list" class="summary-list"></div>
            </div>
            <div class="summary-footer">
                <button id="btn-finish" class="btn-primary-large">完成</button>
            </div>
        </div>

        <div id="dashboard-view" class="view hidden">
            <header class="home-header">
                <button id="btn-back-home" class="btn-icon">←</button>
                <h1>数据统计</h1>
                <button id="btn-dashboard-more" class="btn-icon">⋮</button>
                <div id="dashboard-more-menu" class="more-menu hidden">
                    <div class="menu-item" id="btn-menu-wordlist">查看单词表</div>
                </div>
            </header>
            <main class="dashboard-main">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-val" id="dash-today-learned">0</div>
                        <div class="stat-label">今日已学</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val" id="dash-vocab-count">0</div>
                        <div class="stat-label">生词本</div>
                    </div>
                </div>
                <div class="progress-section">
                    <h3>学习进度</h3>
                    <div class="progress-bar-large">
                        <div id="dash-progress-fill" class="progress-fill" style="width: 0%;"></div>
                    </div>
                    <div class="progress-labels">
                        <span>已学 <span id="dash-learned">0</span></span>
                        <span>总词数 <span id="dash-total">0</span></span>
                    </div>
                </div>
            </main>
        </div>

        <div id="library-view" class="view hidden">
            <header class="home-header">
                <button id="btn-back-dashboard" class="btn-icon">←</button>
                <h1>词书库</h1>
                <div style="width: 24px;"></div>
            </header>
            <main class="library-main">
                <div class="lib-book-item" data-file="book_core" data-title="核心葡语词汇" data-cover="core" data-cover-text="CORE\nVOCAB">
                    <div class="book-cover core">
                        <span class="cover-text">CORE<br>VOCAB</span>
                    </div>
                    <div class="lib-book-info">
                        <h3>核心葡语词汇</h3>
                        <p class="lib-book-meta"><span>100词</span></p>
                    </div>
                </div>
                <div class="lib-book-item" data-file="book_travel" data-title="旅游实用短语" data-cover="travel" data-cover-text="TRAVEL\nPHRASES">
                    <div class="book-cover travel">
                        <span class="cover-text">TRAVEL<br>PHRASES</span>
                    </div>
                    <div class="lib-book-info">
                        <h3>旅游实用短语</h3>
                        <p class="lib-book-meta"><span>50词</span></p>
                    </div>
                </div>
            </main>
        </div>

        <div id="wordlist-view" class="view hidden">
            <header class="home-header" style="background: #1a1a1a; z-index: 10;">
                <button id="btn-back-from-wordlist" class="btn-icon">←</button>
                <h1 style="font-size: 1.1rem;">单词表</h1>
                <div style="width: 24px;"></div>
            </header>
            <div class="wordlist-stats-bar">
                <span>共 <span id="wordlist-total-count">0</span> 词</span>
                <span id="wordlist-unit-count">0词</span>
            </div>
            <main class="wordlist-main" id="wordlist-items-container"></main>
        </div>

        <div id="word-popup-modal" class="hidden">
            <div id="word-popup-overlay" class="popup-overlay"></div>
            <div class="popup-content">
                <h3 id="wp-word"></h3>
                <p id="wp-phonetic" style="color:rgba(255,255,255,0.6); font-size:0.9rem; margin-bottom:15px;"></p>
                <div id="wp-meanings"></div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
