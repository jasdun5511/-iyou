<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Vocabulário - Classic UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        
        <div id="home-view" class="view active">
            <h1 class="home-title">Splendid</h1>
            <div class="home-bottom">
                <div class="cards-container" id="btn-learn">
                    <div class="nav-card"><h3>Learn</h3><span class="nav-count" id="learn-count">0</span></div>
                    <div class="nav-card"><h3>Review</h3><span class="nav-count">0</span></div>
                </div>
            </div>
        </div>

        <div id="learning-view" class="view hidden">
            <header class="header">
                <div class="header-left">
                    <i class="fa-solid fa-xmark close-icon" id="btn-back"></i>
                    <div class="progress-container">
                        <div class="progress-bar" id="top-progress-bar"></div>
                    </div>
                    <span class="header-title" id="progress-text">学习</span>
                </div>
                <div class="header-right">
                    <i class="fa-regular fa-lightbulb bulb-icon"></i>
                </div>
            </header>

            <main class="main-content">
                <div id="top-phrase-area" class="bubble phrase-bubble hidden">
                    <p id="recognize-example-pt">...</p>
                </div>

                <div class="word-display">
                    <h1 class="word" id="word-pt">você</h1>
                    <div class="pronunciation-row" id="phonetic-container">
                        <span class="phonetic" id="word-phonetic-text">[ voˈse ]</span>
                        <i class="fa-solid fa-volume-high audio-icon"></i>
                    </div>
                </div>

                <div id="quiz-area" class="quiz-container">
                    <div class="option" onclick="checkAnswer(0)"><div class="opt-content"></div></div>
                    <div class="option" onclick="checkAnswer(1)"><div class="opt-content"></div></div>
                    <div class="option" onclick="checkAnswer(2)"><div class="opt-content"></div></div>
                    <div class="option" onclick="checkAnswer(3)"><div class="opt-content"></div></div>
                </div>

                <div id="detail-area" class="bubble answer-bubble hidden">
                    <div class="answer-header">
                        <span class="answer-title">释义 / <span id="word-pos" class="para-green"></span> <span id="word-pt-small" class="highlight-word"></span></span>
                    </div>
                    <div class="megaphone-row" id="btn-open-immersive">
                        <i class="fa-solid fa-volume-high answer-megaphone"></i>
                        <span style="font-size: 0.7rem; color: #ccc; margin-left: 5px;">查看详情卡片</span>
                    </div>
                    <div class="meaning-row">
                        <span class="pt-tag">pt</span>
                        <span class="meaning-text" id="word-zh-title">...</span>
                    </div>
                    <p id="word-example-zh" style="font-size: 0.85rem; color: #999; margin-top: 10px;"></p>
                </div>
            </main>

            <footer class="footer-buttons">
                <div id="footer-recognize" class="action-group hidden">
                    <button class="btn btn-forgot" id="btn-not-recognize">不认识</button>
                    <button class="btn btn-known" id="btn-recognize">认识</button>
                </div>
                <div id="footer-detail" class="action-group hidden">
                    <button class="btn btn-forgot" id="btn-forgot">记错了</button>
                    <button class="btn btn-known" id="btn-next">下一词</button>
                </div>
            </footer>
        </div>

        <div id="immersive-modal" class="view hidden" style="z-index: 50; background: #fff;">
            <div class="im-header">
                <i class="fa-solid fa-chevron-down im-close" id="im-btn-close"></i>
            </div>
            <div class="immersive-upper">
                <div class="slider-window" id="upper-window">
                    <div class="slider-track" id="upper-track"></div>
                </div>
                <div class="upper-pagination" id="upper-dots"></div>
            </div>
            <div class="immersive-lower">
                <div class="slider-window" id="lower-window">
                    <div class="slider-track" id="lower-track"></div>
                </div>
                <div class="global-pagination" id="global-dots"></div>
            </div>
        </div>

        <div id="transition-view" class="view hidden" style="z-index: 55; background: radial-gradient(circle at 50% 30%, #2a1b3d 0%, #1a1a24 50%, #121212 100%);">
            <div class="completion-screen">
                <h1 class="completion-title">首组单词辨识完成</h1>
                <p class="completion-reward">+20 酷币</p>
                <div class="completion-character">😀</div>
                <div class="completion-panel">
                    <p class="panel-hint">辨识后拼写，更能加强记忆哦</p>
                    <button id="btn-start-spell" class="btn-primary-gradient">开始拼写</button>
                    <button id="btn-skip-spell" class="btn-ghost">小结</button>
                </div>
            </div>
        </div>

        <div id="spelling-view" class="view hidden" style="z-index: 60; background-color: #121212;">
            <div class="spelling-container">
                
                <div class="spelling-header">
                    <p id="spell-word-meaning" class="spelling-meaning">v. 使（价格、价值等）回升...</p>
                </div>

                <div class="spelling-body">
                    <div class="spelling-input-area">
                        <div id="letter-boxes" class="word-slots">
                            </div>
                        <input type="text" id="hidden-input" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                    </div>
                    <div class="spelling-audio" id="spell-audio-btn">
                        <i class="fa-solid fa-volume-high"></i>
                    </div>
                </div>

                <div class="spelling-footer">
                    <div id="hint-container" class="spell-action-btn">
                        <i class="fa-regular fa-lightbulb" id="bulb-icon-spell"></i>
                        <div id="phonetic-text" class="phonetic-text hidden" style="font-size: 1.2rem; margin-left: 10px; color: #f39c12; font-family: monospace;"></div>
                    </div>
                    <div id="btn-spell-forgot" class="spell-action-btn text-btn">
                        不认识
                    </div>
                </div>

            </div>
        </div>

        <div id="summary-view" class="view hidden" style="z-index: 70; background: #f0f2f5;">
            <header class="summary-header">
                <h2 style="color:#333">学习小结</h2>
                <p style="color:#999">本次共完成 <span id="total-words-count">0</span> 个单词</p>
            </header>
            <div class="summary-list" id="summary-list"></div>
            <div class="summary-footer"><button id="btn-finish" class="btn btn-known" style="width:90%">完成学习</button></div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
