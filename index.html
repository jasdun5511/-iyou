<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Vocabulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="bg-blur">
        
        <div id="learning-view" class="view active" style="padding: 20px;">
            <h1 style="margin-top: 40px; margin-bottom: 20px;">capital</h1>
            
            <div id="detail-area">
                <div class="card sentence-card" style="position: relative;">
                    <p class="en-text">The <span>capital</span> of China is Beijing.</p>
                    <p class="zh-text">中国的首都是北京。</p>
                    
                    <div class="expand-card-btn" id="btn-open-immersive">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="4" width="16" height="16" rx="3" ry="3"></rect>
                            <line x1="4" y1="16" x2="20" y2="16"></line>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div id="immersive-modal" class="modal hidden">
            <div class="modal-bg">
                <img id="im-bg-image" src="" alt="">
                <div class="bg-gradient-mask"></div>
            </div>
            
            <div class="modal-content-wrapper">
                
                <div class="im-upper-layer">
                    <div class="upper-header">
                        <span class="source-tag" id="im-source-tag">来源</span>
                        <div class="menu-dots">•••</div>
                    </div>
                    
                    <div class="slider-window" id="upper-window">
                        <div class="slider-track" id="upper-track">
                            </div>
                    </div>

                    <div class="upper-pagination" id="upper-dots">
                        </div>
                </div>

                <div class="im-lower-layer">
                    <div class="slider-window" id="lower-window" style="overflow: visible;">
                        <div class="slider-track" id="lower-track">
                            </div>
                    </div>
                </div>

                <div class="im-footer">
                    <div class="footer-btn left" id="im-btn-next">下一词</div>
                    
                    <div class="global-pagination" id="global-dots">
                        </div>

                    <div class="footer-btn right" id="im-btn-close">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>

            </div>
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
