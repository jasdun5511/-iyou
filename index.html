<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Vocabulário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app" class="bg-blur">
        
        <div id="home-view" class="view active">
            <h1 class="home-title">Splendid</h1>
            <div class="home-bottom">
                <div class="cards-container" id="btn-learn">
                    <div class="nav-card">
                        <h3>Learn</h3>
                        <span class="nav-count" id="learn-count">0</span>
                    </div>
                    <div class="nav-card">
                        <h3>Review</h3>
                        <span class="nav-count">0</span>
                    </div>
                </div>
                <nav class="bottom-nav">
                    <i class="fa-solid fa-layer-group active"></i>
                    <i class="fa-solid fa-box-archive"></i>
                    <i class="fa-solid fa-chart-line"></i>
                </nav>
            </div>
        </div>

        <div id="learning-view" class="view hidden">
            <header class="top-bar">
                <div class="left" id="btn-back">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span id="progress-text">1/3</span>
                </div>
                <div class="right">
                    <i class="fa-solid fa-rotate-left"></i>
                    <i class="fa-regular fa-star"></i>
                    <i class="fa-solid fa-fire-flame-curved"></i>
                    <i class="fa-solid fa-ellipsis"></i>
                </div>
            </header>

            <main class="content-area">
                <div class="word-section">
                    <div class="word-row">
                        <h1 id="word-pt">mesmo</h1>
                        <div class="progress-dots">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                    </div>
                    
                    <div class="phonetic-row" id="phonetic-container">
                        <span class="accent-tag">葡 <i class="fa-solid fa-volume-low"></i></span>
                        <span id="word-phonetic-text">/'mez.mu/</span>
                    </div>

                    <div id="definition-area" class="hidden">
                        <div class="def-line"><span id="word-pos" class="pos-grey"></span> <span id="word-zh-title" class="zh-white"></span></div>
                    </div>
                </div>

                <div id="quiz-area">
                    <p class="hint-text">先回想词义再选择，想不起来「看答案」</p>
                    <div class="options-list">
                        <div class="option" onclick="checkAnswer(0)">
                            <div class="opt-content"></div>
                        </div>
                        <div class="option" onclick="checkAnswer(1)">
                            <div class="opt-content"></div>
                        </div>
                        <div class="option" onclick="checkAnswer(2)">
                            <div class="opt-content"></div>
                        </div>
                        <div class="option" onclick="checkAnswer(3)">
                            <div class="opt-content"></div>
                        </div>
                    </div>
                </div>

                <div id="detail-area" class="hidden">
                    <div class="card sentence-card">
                        <p id="word-example-pt" class="en-text">...</p>
                        <p id="word-example-zh" class="zh-text">...</p>
                    </div>
                    <div class="card phrases-card" id="phrases-container"></div>
                </div>
            </main>

            <footer class="bottom-action">
                <div id="footer-quiz" class="action-item" onclick="showAnswerDirectly()">
                    <span>看答案</span>
                    <div class="line red"></div>
                </div>
                <div id="footer-next" class="action-item hidden" onclick="loadNextState()">
                    <span>下一词</span>
                    <div class="line green"></div>
                </div>
            </footer>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
