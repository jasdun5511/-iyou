<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Vocabulário - 葡文词汇</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="avatar-container">
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix" alt="Avatar" class="avatar">
                <div class="notification-dot"></div>
            </div>
        </header>

        <main>
            <h1 class="greeting">Splendid</h1>
            
            <div class="cards-container">
                <div class="glass-card" id="btn-learn">
                    <h2>Learn</h2>
                    <p class="count">69</p>
                </div>
                <div class="glass-card" id="btn-review">
                    <h2>Review</h2>
                    <p class="count">0</p>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <i class="fa-solid fa-layer-group active"></i>
            <i class="fa-solid fa-box-archive"></i>
            <i class="fa-solid fa-chart-line"></i>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
